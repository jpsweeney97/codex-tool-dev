interface:
  display_name: "Scrutinize"
  short_description: "Adversarial review with hard gates"
  default_prompt: "Use $scrutinize to adversarially test this artifact, cite evidence, and state the verdict plus required changes. Ask for an execution-readiness review when you need to know if it is ready to execute; ask for a formal stress test when you want an assumptions audit, pre-mortem, dimensional critique, and confidence boundary."
